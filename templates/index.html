<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bill Splitter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Bill Splitter</h1>

        <div class="section">
        <h2>Мои счета</h2>
        
        <div class="bills-list">
            <p>Нет сохранённых счетов</p>
        </div>

        <form action="/create" method="post" class="form-inline">
            <input type="text" name="name" placeholder="Название счёта" required>
            <button type="submit" class="btn">+ Создать</button>
        </form>

        <div class="section active">
            <div class="bill-header">
        <h2>Название счёта</h2>
        <button class="btn-small btn-danger">Закрыть</button>
    </div>

    <h3>Участники</h3>
    <div class="user-list"></div>
    <form class="form-inline">
        <input type="text" placeholder="Имя">
        <button class="btn-small">+ Добавить</button>
    </form>

    <h3>Товары</h3>
    <p>Нет добавленных товаров</p>
</div>

</body>
</html>
